spring.application.name=OptiViewServer

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:55432/ophthalmica_db?options=-c%20TimeZone=UTC}
spring.datasource.username=${DB_USERNAME:ophthalmica_user}
spring.datasource.password=${DB_PASSWORD:ophthalmica_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

server.port=8080